<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HyperLoto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', system-ui, sans-serif; }
    .glass { backdrop-filter: blur(14px); background: rgba(255,255,255,0.08); }
    .ball { width: 3.25rem; height: 3.25rem; }
    .heat-cell { aspect-ratio: 1 / 1; }
    @media (min-width: 768px) { .ball { width: 4rem; height: 4rem; } }
    input[type="range"]::-webkit-slider-thumb { appearance:none; width:18px; height:18px; border-radius:9999px; background:#818cf8; cursor:pointer; }
    input[type="range"]::-moz-range-thumb { width:18px; height:18px; border-radius:9999px; background:#818cf8; cursor:pointer; border:none; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.35); border-radius: 999px; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 bg-[radial-gradient(circle_at_top_left,_rgba(99,102,241,0.2),_transparent_24%),radial-gradient(circle_at_top_right,_rgba(16,185,129,0.14),_transparent_26%),radial-gradient(circle_at_bottom,_rgba(244,114,182,0.10),_transparent_24%),linear-gradient(180deg,_#020617,_#0f172a)]">
  <div class="max-w-7xl mx-auto px-4 py-6 md:py-8">
    <header class="glass border border-white/10 rounded-3xl shadow-2xl p-5 md:p-7 mb-6">
      <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-5">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 rounded-2xl bg-indigo-500/20 border border-indigo-400/30 flex items-center justify-center text-2xl">🚀</div>
            <div>
              <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white">HyperLoto v4</h1>
              <p class="text-sm md:text-base text-slate-300">自動最適化・セット推定・共起ヒートマップ・大量シミュレーション対応のロト研究ツール</p>
            </div>
          </div>
          <p class="text-xs md:text-sm text-slate-400 leading-relaxed max-w-4xl">
            CSVを読み込むと、予測、重み自動調整、セット候補推定、モンテカルロ、共起ヒートマップ、候補組合せ探索をまとめて実行できます。
            予測は研究用途の参考情報であり、当選を保証するものではありません。
          </p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button id="loto6-button" class="px-4 py-2 rounded-2xl font-semibold bg-slate-700 text-white border border-white/10">ロト6</button>
          <button id="loto7-button" class="px-4 py-2 rounded-2xl font-semibold bg-indigo-500 text-white shadow-lg shadow-indigo-500/30">ロト7</button>
        </div>
      </div>
    </header>

    <section class="grid grid-cols-1 xl:grid-cols-[1.2fr_0.8fr] gap-6 mb-6">
      <div class="glass border border-white/10 rounded-3xl p-5 md:p-6 shadow-xl">
        <h2 class="text-xl md:text-2xl font-bold text-white mb-4">データと実行設定</h2>
        <div class="flex flex-wrap gap-3 mb-4">
          <label class="inline-flex items-center gap-2 px-4 py-2 rounded-2xl bg-indigo-500 hover:bg-indigo-400 transition text-white font-semibold cursor-pointer">
            CSVをアップロード
            <input id="file-upload" type="file" accept=".csv" class="hidden" />
          </label>
          <button id="sample-data-button" class="px-4 py-2 rounded-2xl bg-emerald-500 hover:bg-emerald-400 transition text-white font-semibold">サンプルデータ</button>
          <button id="auto-run-button" class="px-4 py-2 rounded-2xl bg-cyan-500 hover:bg-cyan-400 transition text-slate-950 font-semibold">全自動実行</button>
          <button id="simulate-button" class="px-4 py-2 rounded-2xl bg-amber-500 hover:bg-amber-400 transition text-slate-950 font-semibold">モンテカルロ</button>
          <button id="auto-tune-button" class="px-4 py-2 rounded-2xl bg-fuchsia-500 hover:bg-fuchsia-400 transition text-white font-semibold">重み自動調整</button>
